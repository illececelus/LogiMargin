name: App Builder

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: app-builder-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Lint, type-check, and build
    runs-on: ubuntu-latest
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      ANTHROPIC_API_KEY: placeholder-anthropic-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_FUEL_ZONE: TX
      NEXT_PUBLIC_IFTA_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run app builder checks
        run: npm run ci:app-builder
