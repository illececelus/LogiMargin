name: Nightly App Autopilot

on:
  schedule:
    - cron: '0 23 * * *'
    - cron: '0 0 * * *'
    - cron: '0 1 * * *'
    - cron: '0 2 * * *'
    - cron: '0 3 * * *'
    - cron: '0 4 * * *'
    - cron: '0 5 * * *'
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: nightly-app-autopilot
  cancel-in-progress: false

jobs:
  improve:
    name: Audit, build, and propose safe improvements
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      NEXT_TELEMETRY_DISABLED: "1"
      NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
      NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder-anon-key
      SUPABASE_SERVICE_ROLE_KEY: placeholder-service-role-key
      ANTHROPIC_API_KEY: placeholder-anthropic-key
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NEXT_PUBLIC_DEFAULT_FUEL_ZONE: TX
      NEXT_PUBLIC_IFTA_ENABLED: "true"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run baseline checks
        run: npm run ci:app-builder

      - name: Try safe production dependency fixes
        run: npm run app:autopilot

      - name: Create pull request for safe improvements
        uses: peter-evans/create-pull-request@v6
        with:
          branch: cursor/nightly-app-autopilot-113c
          delete-branch: true
          title: "Nightly app autopilot maintenance"
          commit-message: "Apply nightly autopilot maintenance updates"
          body: |
            ## Summary
            - Refreshes lockfile-compatible dependency versions.
            - Applies safe production audit fixes to the lockfile.
            - Verifies linting, TypeScript, production build, and production dependency audit.

            ## Testing
            - `npm run ci:nightly-autopilot`
