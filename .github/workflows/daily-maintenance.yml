name: Daily Maintenance

on:
  schedule:
    - cron: '17 10 * * *'
  workflow_dispatch:

concurrency:
  group: daily-maintenance-${{ github.ref }}
  cancel-in-progress: true

jobs:
  maintenance:
    name: Lint, type-check, and audit
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run daily maintenance checks
        run: npm run ci:daily-maintenance
